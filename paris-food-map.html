<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Les Frenchies · Paris Food Map</title>
<meta name="description" content="178 curated restaurants, cafés and bistros in Paris — handpicked by Les Frenchies Travel.">
<meta name="theme-color" content="#c8922a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Paris Food">
<meta property="og:title" content="Les Frenchies · Paris Food Map">
<meta property="og:description" content="178 curated restaurants, cafés and bistros in Paris — handpicked by Les Frenchies Travel.">
<meta property="og:type" content="website">
<link rel="manifest" href='data:application/manifest+json,{"name":"Paris Food Guide","short_name":"Paris Food","start_url":".","display":"standalone","background_color":"%23faf8f5","theme_color":"%23c8922a"}'>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf8f5;--white:#fff;--border:#e8e3dc;--text:#1c1c1c;--muted:#9a8f82;
  --accent:#c8922a;--accent-light:#fdf3e3;--sidebar:232px;--list:320px;
  --hdr-bg:#12121f;--hdr-text:#ffffff;--hdr-gold:#c8922a;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* ── HEADER ── */
#header{background:var(--hdr-bg);height:58px;padding:0 18px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--hdr-gold);flex-shrink:0;z-index:500;}
#header h1{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;font-weight:700;white-space:nowrap;color:var(--hdr-text);letter-spacing:.04em;text-transform:uppercase;}
#header h1 em{font-style:normal;color:var(--hdr-gold);}
#paris-badge{background:#cc2200;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:.1em;padding:2px 7px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:2px;}
#header h1 .tagline{font-family:'Inter',sans-serif;font-size:0.62rem;font-weight:400;color:rgba(255,255,255,.5);letter-spacing:.12em;text-transform:uppercase;display:block;margin-top:-3px;}
.hdiv{width:1px;height:18px;background:rgba(255,255,255,.2);flex-shrink:0;}
#search-wrap{flex:1;max-width:380px;position:relative;}
#search{width:100%;padding:6px 10px 6px 30px;border-radius:5px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:0.8rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s,background .15s;}
#search::placeholder{color:rgba(255,255,255,.45);}
#search:focus{border-color:var(--hdr-gold);background:rgba(255,255,255,.15);}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:0.78rem;opacity:.5;pointer-events:none;color:#fff;}
#hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
#count-badge{font-size:0.72rem;color:rgba(255,255,255,.6);white-space:nowrap;}
#count-badge strong{color:var(--hdr-gold);font-weight:600;}

.hdr-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:5px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);font-size:0.72rem;font-family:'Inter',sans-serif;color:rgba(255,255,255,.8);cursor:pointer;white-space:nowrap;transition:all .15s;}
.hdr-btn:hover{border-color:var(--hdr-gold);color:var(--hdr-gold);}
.hdr-btn.active{background:rgba(200,146,42,.2);border-color:var(--hdr-gold);color:var(--hdr-gold);}
#fav-btn .fav-count{background:var(--accent);color:#fff;border-radius:9px;padding:1px 6px;font-size:0.65rem;font-weight:600;display:none;}
#fav-btn .fav-count.show{display:inline;}
#mobile-filter-btn{display:none;}

/* ── LAYOUT ── */
#layout{display:flex;flex:1;overflow:hidden;position:relative;}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:16px 14px;transition:width .25s ease,min-width .25s ease,padding .25s ease,border-color .25s ease;}
#sidebar.collapsed{width:0;min-width:0;padding:0;overflow:hidden;border-right-color:transparent;}
#sidebar-toggle{position:absolute;left:var(--sidebar);top:50%;transform:translateY(-50%);width:16px;height:48px;background:var(--white);border:1px solid var(--border);border-left:none;border-radius:0 6px 6px 0;cursor:pointer;z-index:460;display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:var(--muted);transition:left .25s ease;box-shadow:2px 0 6px rgba(0,0,0,.07);}
#sidebar-toggle:hover{color:var(--accent);}
#layout.sidebar-collapsed #sidebar-toggle{left:0;border-left:1px solid var(--border);border-right:none;border-radius:6px 0 0 6px;}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.fs{margin-bottom:20px;}
.ft{font-size:0.63rem;text-transform:uppercase;letter-spacing:1.3px;color:var(--muted);font-weight:600;margin-bottom:9px;}

/* Experience slider — vertical */
.exp-wrap{display:flex;align-items:stretch;gap:10px;padding:4px 0 6px;}
#exp-slider{writing-mode:vertical-lr;-webkit-appearance:none;appearance:none;width:4px;height:116px;background:var(--border);border-radius:2px;outline:none;cursor:pointer;flex-shrink:0;margin:3px 7px;}
#exp-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--white);border:2.5px solid var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.18);cursor:pointer;}
#exp-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--white);border:2.5px solid var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.18);cursor:pointer;border-style:solid;}
.exp-labels{display:flex;flex-direction:column;justify-content:space-between;flex:1;padding:2px 0;}
.exp-labels span{font-size:0.6rem;color:var(--muted);line-height:1.3;transition:color .15s,font-weight .15s;}
.exp-labels span.active{color:var(--accent);font-weight:600;}

/* Category filters */
#cat-filters{display:flex;flex-wrap:wrap;gap:5px;}
.filter-item{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:0.69rem;font-family:'Inter',sans-serif;color:#6b6055;user-select:none;transition:all .12s;}
.filter-item:hover{border-color:var(--accent);color:var(--text);}
.filter-item.off{opacity:.32;}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* Arr grid */
.arr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.arr-btn{padding:4px 1px;border-radius:4px;border:1px solid var(--border);background:var(--white);color:var(--muted);font-size:0.68rem;font-family:'Inter',sans-serif;cursor:pointer;text-align:center;transition:all .12s;}
.arr-btn.on{background:var(--text);border-color:var(--text);color:#fff;font-weight:500;}
.arr-btn:hover:not(.on){border-color:var(--accent);color:var(--accent);}

/* Meal */
.meal-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.meal-btn{padding:5px 4px;border-radius:5px;border:1px solid var(--border);background:var(--white);color:var(--muted);font-size:0.7rem;font-family:'Inter',sans-serif;cursor:pointer;transition:all .12s;text-align:center;}
.meal-btn.on{background:var(--text);border-color:var(--text);color:#fff;font-weight:500;}
.meal-btn:hover:not(.on){border-color:var(--accent);color:var(--accent);}

/* Price */
.price-row{display:flex;gap:4px;flex-wrap:wrap;}
.price-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--white);color:var(--muted);font-size:0.73rem;font-family:'Inter',sans-serif;cursor:pointer;transition:all .12s;}
.price-btn.on{background:var(--text);border-color:var(--text);color:#fff;font-weight:500;}
.price-btn:hover:not(.on){border-color:var(--accent);color:var(--accent);}

#reset-btn{width:100%;padding:6px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.73rem;font-family:'Inter',sans-serif;cursor:pointer;transition:all .12s;margin-top:4px;}
#reset-btn:hover{border-color:var(--text);color:var(--text);}
#sidebar-footer{font-size:0.63rem;color:var(--muted);text-align:center;padding:12px 0 2px;line-height:1.6;}
#sidebar-footer a{color:var(--muted);text-decoration:none;}
#sidebar-footer a:hover{color:var(--accent);}
#empty-state{padding:36px 20px;text-align:center;color:var(--muted);font-size:0.82rem;line-height:1.8;}
#empty-state button{margin-top:10px;padding:5px 16px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:0.78rem;font-family:'Inter',sans-serif;cursor:pointer;}
#empty-state button:hover{border-color:var(--accent);color:var(--accent);}

/* ── MAP ── */
#map{flex:1;position:relative;}
#loc-btn{position:absolute;bottom:90px;right:10px;z-index:400;width:34px;height:34px;border-radius:6px;background:var(--white);border:1px solid var(--border);box-shadow:0 1px 5px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:border-color .15s;}
#loc-btn:hover{border-color:var(--accent);}
#loc-btn.locating{animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── MOBILE OVERLAY ── */
#mobile-overlay{display:none;position:fixed;inset:0;top:54px;background:rgba(0,0,0,.38);z-index:480;}
#mobile-overlay.show{display:block;}

/* ── SIDEBAR CLOSE HEADER (mobile only) ── */
#sidebar-mob-header{display:none;padding:14px 16px 12px;border-bottom:1px solid var(--border);align-items:center;justify-content:space-between;flex-shrink:0;background:var(--white);}
#sidebar-mob-header span{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;color:var(--text);}
#sidebar-mob-close{background:none;border:none;font-size:1.1rem;color:var(--muted);cursor:pointer;padding:2px 6px;}
#sidebar-mob-close:hover{color:var(--text);}
@media(max-width:700px){#sidebar-mob-header{display:flex;}}
body.force-mobile #sidebar-mob-header{display:flex;}

/* ── MOBILE ACTION BAR ── */
#mobile-bar{display:none;position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:450;align-items:center;gap:10px;white-space:nowrap;}
.mbar-pill{display:flex;align-items:center;gap:8px;padding:13px 22px;border-radius:50px;background:var(--white);border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.16);font-size:0.88rem;font-family:'Inter',sans-serif;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;}
.mbar-pill:active{transform:scale(.96);}
.mbar-sub{font-size:0.72rem;color:var(--muted);font-weight:400;}
.mbar-badge{background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;font-size:0.65rem;font-weight:700;display:none;}
.mbar-badge.show{display:inline;}

/* ── PHOTO TOOLTIP ── */
.leaflet-tooltip.photo-tip{padding:0;background:var(--white);border:1px solid var(--border);border-radius:10px;box-shadow:0 6px 28px rgba(0,0,0,.16);overflow:hidden;width:210px;pointer-events:none;}
.leaflet-tooltip.photo-tip::before{display:none;}
.tip-img{width:210px;height:132px;object-fit:cover;display:block;background:#f0ebe4;}
.tip-body{padding:9px 11px 11px;}
.tip-name{font-family:'Playfair Display',serif;font-size:0.88rem;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.25;}
.tip-sub{font-size:0.68rem;color:var(--muted);margin-bottom:4px;}
.tip-web{font-size:0.65rem;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;text-decoration:none;}
.tip-web:hover{text-decoration:underline;}

/* ── POPUP ── */
.pw{min-width:230px;max-width:290px;font-family:'Inter',sans-serif;}
.photo-strip{display:flex;gap:2px;margin:-13px -14px 12px;overflow-x:auto;scrollbar-width:none;}
.photo-strip::-webkit-scrollbar{display:none;}
.photo-strip img{width:116px;height:76px;object-fit:cover;flex-shrink:0;background:#f0ebe4;}
.photo-strip img:first-child{border-radius:8px 0 0 0;}
.photo-strip img:last-child{border-radius:0 8px 0 0;}
.pn{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:5px;}
.pbadges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;align-items:center;}

.badge-michelin{display:inline-flex;align-items:center;gap:2px;font-size:0.64rem;font-weight:700;padding:2px 7px;border-radius:3px;background:#fff8e6;color:#a07800;border:1px solid #e0cc80;}
.badge-cat{font-size:0.64rem;font-weight:600;padding:2px 7px;border-radius:3px;color:#fff;}
.pmeta{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.pprice{font-size:0.75rem;font-weight:600;color:var(--accent);}
.parr{font-size:0.68rem;color:var(--muted);}
.pdiv{height:1px;background:#f0ebe4;margin-bottom:8px;}
.prev{font-size:0.76rem;color:#555;line-height:1.5;margin-bottom:9px;font-style:italic;}
.pactions{display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap;}
.pact-btn{flex:1;min-width:0;padding:6px 7px;border-radius:4px;border:1px solid var(--border);background:var(--white);font-size:0.7rem;font-family:'Inter',sans-serif;color:var(--text);cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:3px;transition:all .12s;white-space:nowrap;}
.pact-btn:hover{border-color:var(--accent);color:var(--accent);}
.pact-btn.saved{background:var(--accent);border-color:var(--accent);color:#fff;}
.psource{font-size:0.64rem;color:var(--muted);}

.leaflet-popup-content-wrapper{border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,.11),0 1px 4px rgba(0,0,0,.06);border:1px solid var(--border);}
.leaflet-popup-tip-container{display:none;}
.leaflet-popup-content{margin:13px 14px;}
.leaflet-popup-close-button{color:var(--muted)!important;top:8px!important;right:10px!important;font-size:16px!important;}


/* ── FAVOURITES PANEL ── */
#fav-panel{position:absolute;top:0;right:0;bottom:0;width:280px;background:var(--white);border-left:1px solid var(--border);z-index:600;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column;}
#fav-panel.open{transform:translateX(0);}
#fav-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#fav-header h3{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;}
#fav-close{background:none;border:none;font-size:1.1rem;color:var(--muted);cursor:pointer;padding:2px 6px;}
#fav-close:hover{color:var(--text);}
#fav-list{flex:1;overflow-y:auto;padding:10px 14px;}
#fav-list::-webkit-scrollbar{width:3px;}
#fav-list::-webkit-scrollbar-thumb{background:var(--border);}
.fav-item{padding:8px 0;border-bottom:1px solid #f5f0e8;display:flex;align-items:flex-start;gap:8px;}
.fav-item:last-child{border-bottom:none;}
.fav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.fav-info{flex:1;}
.fav-name{font-size:0.8rem;font-weight:600;color:var(--text);margin-bottom:1px;}
.fav-sub{font-size:0.7rem;color:var(--muted);}
.fav-remove{background:none;border:none;color:#ccc;cursor:pointer;font-size:0.9rem;padding:0 2px;}
.fav-remove:hover{color:#e74c3c;}
#fav-empty{padding:24px 0;text-align:center;color:var(--muted);font-size:0.8rem;line-height:1.6;}
#fav-actions{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.fav-export-btn{padding:7px;border-radius:4px;border:1px solid var(--border);background:var(--white);font-size:0.75rem;font-family:'Inter',sans-serif;color:var(--text);cursor:pointer;transition:all .12s;text-align:center;}
.fav-export-btn:hover{border-color:var(--accent);color:var(--accent);}
.fav-export-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.fav-export-btn.primary:hover{background:#7a5232;border-color:#7a5232;}

/* ── MOBILE (real small screens) ── */
@media(max-width:700px){
  #sidebar-toggle{display:none!important;}
  #list-toggle{display:none!important;}
  #count-badge{display:none;}
  #paris-badge{display:none;}
  #fav-btn{display:none!important;}
  #mobile-filter-btn{display:none!important;}
  #view-toggle{display:none!important;}
  .hdiv{display:none;}
  #search-wrap{max-width:none;flex:1;}
  #mobile-bar{display:flex;}
  /* Filters — slide in from left */
  #sidebar{position:fixed!important;top:54px;left:0;bottom:0;width:85%!important;max-height:none;border-right:1px solid var(--border);border-top:none;border-radius:0 10px 10px 0;z-index:500;transform:translateX(-100%);transition:transform .25s ease;padding-bottom:24px;}
  #sidebar::before{display:none;}
  #sidebar.open{transform:translateX(0);}
  /* List — horizontal card strip pinned to bottom */
  #list-panel{display:none!important;position:fixed!important;bottom:0!important;left:0!important;right:0!important;top:auto!important;width:100%!important;min-width:0!important;height:220px!important;max-height:220px!important;border-left:none!important;border-top:1px solid var(--border)!important;border-radius:0!important;z-index:490!important;flex-direction:column!important;overflow:hidden!important;transform:none!important;transition:none!important;}
  #list-panel.mobile-open{display:flex!important;}
  #list-panel.collapsed{width:100%!important;min-width:0!important;}
  #list-panel::before{display:none!important;}
  #list-cards{flex-direction:row!important;overflow-x:auto!important;overflow-y:hidden!important;flex-wrap:nowrap!important;padding:8px 14px 10px!important;scrollbar-width:none;}
  #list-cards::-webkit-scrollbar{display:none;}
  .lc-card{min-width:250px!important;max-width:250px!important;flex-shrink:0!important;}
  /* Saved — slide in from right (existing behaviour) */
  #fav-panel{position:fixed!important;width:100%;border-left:none;border-top:1px solid var(--border);top:54px;bottom:0;height:auto;border-radius:0;}
  #loc-btn{bottom:90px;right:14px;}
}

/* ── FORCED MOBILE VIEW (desktop toggle) ── */
body.force-mobile #sidebar-toggle{display:none!important;}
body.force-mobile #list-toggle{display:none!important;}
body.force-mobile #count-badge{display:none;}
body.force-mobile #fav-btn{display:none!important;}
body.force-mobile #mobile-filter-btn{display:none!important;}
body.force-mobile .hdiv{display:none;}
body.force-mobile #search-wrap{max-width:none!important;flex:1;}
body.force-mobile #mobile-bar{display:flex;}
/* Filters — slide in from left */
body.force-mobile #sidebar{position:fixed!important;top:54px!important;left:0!important;bottom:0!important;right:auto!important;width:85%!important;max-height:none!important;border-right:1px solid var(--border)!important;border-top:none!important;border-radius:0 10px 10px 0!important;z-index:500!important;transform:translateX(-100%)!important;transition:transform .25s ease!important;padding-bottom:20px!important;}
body.force-mobile #sidebar::before{display:none!important;}
body.force-mobile #sidebar.open{transform:translateX(0)!important;}
/* List — horizontal card strip pinned to bottom */
body.force-mobile #list-panel{display:none!important;position:fixed!important;bottom:0!important;left:0!important;right:0!important;top:auto!important;width:100%!important;min-width:0!important;height:220px!important;max-height:220px!important;border-left:none!important;border-top:1px solid var(--border)!important;border-radius:0!important;z-index:490!important;flex-direction:column!important;overflow:hidden!important;transform:none!important;transition:none!important;}
body.force-mobile #list-panel.mobile-open{display:flex!important;}
body.force-mobile #list-panel.collapsed{width:100%!important;min-width:0!important;}
body.force-mobile #list-panel::before{display:none!important;}
body.force-mobile #list-cards{flex-direction:row!important;overflow-x:auto!important;overflow-y:hidden!important;flex-wrap:nowrap!important;padding:8px 14px 10px!important;scrollbar-width:none;}
body.force-mobile #list-cards::-webkit-scrollbar{display:none;}
body.force-mobile .lc-card{min-width:250px!important;max-width:250px!important;flex-shrink:0!important;}
body.force-mobile #loc-btn{bottom:90px!important;right:14px!important;}
/* Saved — slide in from right */
body.force-mobile #fav-panel{position:fixed!important;width:100%!important;border-left:none!important;border-top:1px solid var(--border)!important;top:54px!important;bottom:0!important;height:auto!important;border-radius:0!important;}

/* ── LIST PANEL ── */
#list-panel{width:var(--list);min-width:var(--list);background:var(--white);border-left:1px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;flex-direction:column;transition:width .25s ease,min-width .25s ease,border-color .25s ease;}
#list-panel.collapsed{width:0;min-width:0;border-left-color:transparent;}
#list-toggle{position:absolute;right:var(--list);top:50%;transform:translateY(-50%);width:16px;height:48px;background:var(--white);border:1px solid var(--border);border-right:none;border-radius:6px 0 0 6px;cursor:pointer;z-index:460;display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:var(--muted);transition:right .25s ease;box-shadow:-2px 0 6px rgba(0,0,0,.07);}
#list-toggle:hover{color:var(--accent);}
#layout.list-collapsed #list-toggle{right:0;border-left:none;border-right:1px solid var(--border);border-radius:0 6px 6px 0;}
#list-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--white);}
#list-title{font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
#list-close{background:none;border:none;cursor:pointer;font-size:1rem;color:var(--muted);line-height:1;}
#list-close:hover{color:var(--text);}
#list-cards{flex:1;min-height:0;padding:10px 12px 16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.lc-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--white);flex-shrink:0;}
.lc-body{padding:10px 12px 12px;}
.lc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:3px;}
.lc-name{font-weight:700;font-size:.88rem;color:var(--text);line-height:1.3;}
.lc-stars{font-size:.8rem;font-weight:600;color:#e8a020;white-space:nowrap;flex-shrink:0;}
.lc-meta{font-size:.7rem;color:var(--muted);margin-bottom:6px;}
.lc-review{font-size:.74rem;color:#444;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.lc-links{display:flex;gap:10px;margin-top:6px;}
.lc-link{font-size:.7rem;color:var(--accent);text-decoration:none;font-weight:600;}
.lc-link:hover{text-decoration:underline;}
.lc-save{background:none;border:none;cursor:pointer;padding:0;font-family:'Inter',sans-serif;}
.lc-saved{color:var(--accent);font-weight:700;}
@media(max-width:700px){#list-toggle{display:none!important;}#list-panel{display:none!important;}}

let favs=JSON.parse(localStorage.getItem('parisFavs')||'[]');
function saveFavs(){localStorage.setItem('parisFavs',JSON.stringify(favs));}
function isFav(name){return favs.includes(name);}
function toggleFav(name){
  if(isFav(name))favs=favs.filter(n=>n!==name);
  else favs.push(name);
  saveFavs();updateFavUI();
}
function updateFavUI(){
  const c=favs.length;
  document.getElementById('fav-count-badge').textContent=c;
  document.getElementById('fav-count-badge').classList.toggle('show',c>0);
  document.getElementById('mbar-fav-badge').textContent=c;
  document.getElementById('mbar-fav-badge').classList.toggle('show',c>0);
  renderFavList();
}
function renderFavList(){
  const list=document.getElementById('fav-list');
  if(!favs.length){list.innerHTML='<div id="fav-empty">No saved places yet.<br>Tap ♥ on any place to save it.</div>';return;}
  list.innerHTML=favs.map(name=>{
    const p=places.find(x=>x.name===name);if(!p)return'';
    const g=getGroupInfo(p.cat);
    return`<div class="fav-item">
      <div class="fav-dot" style="background:${g.color}"></div>
      <div class="fav-info"><div class="fav-name">${p.name}</div><div class="fav-sub">${g.key} · ${p.arr}${ord(p.arr)} arr. · ${p.price}</div></div>
      <button class="fav-remove" onclick="toggleFav('${p.name.replace(/'/g,"\\'")}')">✕</button>
    </div>`;
  }).join('');
}

// ─── STATE & FILTERS ──────────────────────────────────────────────────────────
let activeArrs=new Set([...new Set(places.map(p=>p.arr))]);
let activeMeals=new Set(["breakfast","lunch","dinner","snack"]);
let activePrices=new Set(["€","€€","€€€","€€€€"]);
let activeExp=-1;
let searchQ="";

// ─── URL STATE (deep linking) ─────────────────────────────────────────────────
function writeURLParams(){
  if(location.protocol==='file:')return;
  const p=new URLSearchParams();
  if(searchQ)p.set('q',searchQ);
  if(activeArrs.size<arrNums.length)p.set('arr',[...activeArrs].sort((a,b)=>a-b).join(','));
  if(activePrices.size<4)p.set('price',[...activePrices].join(','));
  if(activeMeals.size<4)p.set('meal',[...activeMeals].join(','));
  if(activeExp>=0)p.set('exp',activeExp);
  const str=p.toString();
  history.replaceState(null,'',location.pathname+(str?'?'+str:''));
}
function readURLParams(){
  if(location.protocol==='file:')return;
  const p=new URLSearchParams(location.search);
  const q=p.get('q');
  if(q){searchQ=q;document.getElementById('search').value=q;}
  const arr=p.get('arr');
  if(arr){
    activeArrs=new Set(arr.split(',').map(Number));
    document.querySelectorAll('.arr-btn').forEach(btn=>btn.classList.toggle('on',activeArrs.has(+btn.dataset.arr)));
  }
  const price=p.get('price');
  if(price){
    activePrices=new Set(price.split(','));
    document.querySelectorAll('.price-btn').forEach(btn=>btn.classList.toggle('on',activePrices.has(btn.dataset.price)));
  }
  const meal=p.get('meal');
  if(meal){
    activeMeals=new Set(meal.split(','));
    document.querySelectorAll('.meal-btn').forEach(btn=>btn.classList.toggle('on',activeMeals.has(btn.dataset.meal)));
  }
  const exp=p.get('exp');
  if(exp!==null){activeExp=parseInt(exp);expSlider.value=activeExp===-1?3:activeExp;syncExpLabel();}
  const place=p.get('place');
  if(place){
    const mk=markers.find(m=>m._p.name===place);
    if(mk){map.once('moveend',()=>{setTimeout(()=>mk.openPopup(),300);});map.flyTo([mk._p.lat,mk._p.lng],16,{duration:1});}
  }
}

// ─── LIST PANEL ───────────────────────────────────────────────────────────────
function isMobileMode(){return window.innerWidth<=700||document.body.classList.contains('force-mobile');}

function renderListPanel(){
  const lp=document.getElementById('list-panel');
  if(isMobileMode()?!lp.classList.contains('mobile-open'):lp.classList.contains('collapsed'))return;
  const cards=document.getElementById('list-cards');
  const titleEl=document.getElementById('list-title');
  const bounds=map.getBounds();
  const visible=places.filter(p=>{
    if(!searchQ&&!bounds.contains([p.lat,p.lng]))return false;
    if(!activeArrs.has(p.arr))return false;
    if(!activePrices.has(p.price))return false;
    if(p.meals&&![...activeMeals].some(m=>p.meals.includes(m)))return false;
    if(searchQ&&scorePlace(p,searchQ)===0)return false;
    if(activeExp>=0&&getExperience(p)!==activeExp)return false;
    return true;
  });
  if(searchQ){
    visible.sort((a,b)=>scorePlace(b,searchQ)-scorePlace(a,searchQ)||(RATINGS[b.name]||0)-(RATINGS[a.name]||0));
  } else {
    visible.sort((a,b)=>(RATINGS[b.name]||0)-(RATINGS[a.name]||0));
  }
  titleEl.textContent=`${visible.length} place${visible.length!==1?'s':''}`;
  if(!visible.length){cards.innerHTML='<div id="empty-state">No places match your filters.<br><button onclick="document.getElementById(\'reset-btn\').click()">↺ Reset filters</button></div>';return;}
  cards.innerHTML=visible.map(p=>{
    const rating=RATINGS[p.name];
    const site=WEBSITES[p.name];
    const grp=getGroupInfo(p.cat);
    const sn=p.name.replace(/'/g,"\\'");
    const saved=isFav(p.name);
    return`<div class="lc-card">
      <div class="lc-body">
        <div class="lc-top">
          <div class="lc-name">${p.name}</div>
          ${rating?`<div class="lc-stars">★ ${rating.toFixed(1)}</div>`:''}
        </div>
        <div class="lc-meta">${grp.key} · ${p.price} · ${p.arr}${ord(p.arr)} arr.</div>
        <div class="lc-review">${p.review}</div>
        <div class="lc-links">
          ${site?`<a class="lc-link" href="${site}" target="_blank" rel="noopener">🌐 Website</a>`:''}
          <a class="lc-link lc-maps" href="https://www.google.com/maps/search/${encodeURIComponent(p.name+' Paris')}" target="_blank" rel="noopener">📍 Maps</a>
          ${p.source==='Les Frenchies Travel'?`<a class="lc-link" href="https://www.youtube.com/@LesFrenchiesTravel/playlists" target="_blank" rel="noopener">▶ Les Frenchies Channel</a>`:''}
          <button class="lc-link lc-save ${saved?'lc-saved':''}" onclick="toggleFav('${sn}');this.classList.toggle('lc-saved',isFav('${sn}'));this.textContent=isFav('${sn}')?'♥ Saved':'♡ Save';">${saved?'♥ Saved':'♡ Save'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
document.getElementById('list-toggle').addEventListener('click',()=>{
  const lp=document.getElementById('list-panel');
  const layout=document.getElementById('layout');
  const btn=document.getElementById('list-toggle');
  const collapsed=lp.classList.toggle('collapsed');
  layout.classList.toggle('list-collapsed',collapsed);
  btn.textContent=collapsed?'‹':'›';
  if(!collapsed)renderListPanel();
  map.invalidateSize();
});
document.getElementById('list-close').addEventListener('click',()=>{
  if(isMobileMode()){
    document.getElementById('list-panel').classList.remove('mobile-open');
    document.getElementById('mbar-list-btn').classList.remove('active');

    document.getElementById('list-panel').classList.add('collapsed');
    document.getElementById('layout').classList.add('list-collapsed');
    document.getElementById('list-toggle').textContent='‹';
    map.invalidateSize();
  }
});

function applyFilters(){
  cluster.clearLayers();
  let n=0;
  markers.forEach(m=>{
    const p=m._p;
    if(!activeArrs.has(p.arr))return;
    if(!activePrices.has(p.price))return;
    if(p.meals&&![...activeMeals].some(m=>p.meals.includes(m)))return;
    if(searchQ&&scorePlace(p,searchQ)===0)return;
    if(activeExp>=0&&getExperience(p)!==activeExp)return;
    cluster.addLayer(m);n++;
  });
  document.getElementById('count').textContent=n;
  document.getElementById('mbar-count').textContent=n+' places';
  renderListPanel();
  writeURLParams();
}

// ─── EXPERIENCE SLIDER ────────────────────────────────────────────────────────
function getExperience(p){
  if(['Bakery','Coffee','Café','Sweets'].includes(p.cat))return 0;
  if(p.cat==='Fine Dining'||p.michelin>0||p.price==='€€€€')return 2;
  return 1;
}
const expSlider=document.getElementById('exp-slider');
const expLabelEls=[document.getElementById('exp-l0'),document.getElementById('exp-l1'),document.getElementById('exp-l2'),document.getElementById('exp-l3')];
function syncExpLabel(){
  const sel=activeExp===-1?3:activeExp;
  expLabelEls.forEach((el,i)=>el.classList.toggle('active',i===sel));
}
expSlider.addEventListener('input',()=>{
  const v=parseInt(expSlider.value);
  activeExp=v===3?-1:v;
  syncExpLabel();
  applyFilters();
});

let userMarker=null;
document.getElementById('loc-btn').addEventListener('click',()=>{
  const btn=document.getElementById('loc-btn');

function scorePlace(p,q){
  const ql=q.toLowerCase().trim();
  if(!ql)return 0;
  let sc=0;
  const pnl=p.name.toLowerCase();
  const rev=(p.review||'').toLowerCase();
  // Direct text matches
  if(pnl.includes(ql))sc+=12;
  if(rev.includes(ql))sc+=7;
  if((p.cat||'').toLowerCase().includes(ql))sc+=5;
  const grp=getGroupInfo(p.cat);
  if(grp.key.toLowerCase().includes(ql))sc+=4;
  // Keyword term matching
  for(const rule of DISC_TERMS){
    const matched=rule.t.some(kw=>ql.includes(kw)||kw.includes(ql)||rev.includes(kw)||pnl.includes(kw));
    if(!matched)continue;
    let bonus=rule.score;
    // Category boost
    if(rule.cats&&rule.cats.includes(grp.key))sc+=bonus+2;
    else if(rule.cats)sc+=1; // partial match — the query fits but not the category
    // Price boost
    if(rule.price&&rule.price.includes(p.price))sc+=bonus;
    // Michelin boost
    if(rule.michelin&&p.michelin>0)sc+=bonus+p.michelin;
    // Local boost
    if(rule.local&&p.local)sc+=bonus;
    // Meal boost
    if(rule.meals&&p.meals&&rule.meals.some(m=>p.meals.includes(m)))sc+=bonus;
    // Arr boost
    if(rule.arrs&&rule.arrs.includes(p.arr))sc+=bonus;
    // Experience boost
    if(rule.exp&&rule.exp.includes(getExperience(p)))sc+=bonus;
  }
  return sc;
}
