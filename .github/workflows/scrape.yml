name: Check Les Frenchies for New Places

on:
  schedule:
    - cron: '0 9 1,15 * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Open issue if new places found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('new_places.txt')) {
              const body = fs.readFileSync('new_places.txt', 'utf8');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'New Les Frenchies places to review',
                body: body
              });
            }
